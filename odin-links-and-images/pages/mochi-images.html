<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
</head>
<body>
    <h2>Gif</h2>
    <p>Gifs are good for animations</p>
    <img src="../images/mochi.gif" width="75" alt="A gif mochi">
    <h2>JPGs</h2>
    <p>JPGs are good for photos</p>
    <img src="../images/mochi.jpg" width="75" alt="A jpg mochi">
    <h2>PNG</h2>
    <p>Good for diagrams and icons</p>
    <img src="../images/mochi.png" width="75" alt="A png mochi">
    <h2>SVG</h2>
    <p>SVGs are vectors! Scale up or down without loss quality</p>
    <img src="../images/mochi.svg" width="75" alt="A svg mochi">
</body>
</html>
